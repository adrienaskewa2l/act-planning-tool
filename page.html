<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACT 2026 – Planning</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --header-h: 64px;
    --axis-w: 54px;
    --col-w: 230px;
    --px-per-min: 1.6;
    --start-h: 7;
    --end-h: 23;
    --green: #0F4C3A;
    --pink: #CF5AFD;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  body { font-family: var(--font); background: #f0f2f5; color: #1a1a1a; }

  /* ── TOOLBAR ── */
  .toolbar {
    position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
    background: var(--green); color: white;
    display: flex; align-items: center; gap: 12px; padding: 0 20px;
    z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.3);
  }
  .toolbar h1 { font-size: 16px; font-weight: 600; flex: 1; }
  .toolbar .logo { font-size: 22px; }
  .btn {
    padding: 7px 14px; border: none; border-radius: 8px; cursor: pointer;
    font-size: 13px; font-weight: 600; transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn-save { background: #fff; color: var(--green); }
  .btn-docx { background: #4CAF50; color: white; }
  .btn-add  { background: rgba(255,255,255,.18); color: white; border: 1px solid rgba(255,255,255,.4); }
  .toast {
    position: fixed; bottom: 20px; right: 20px; background: #333; color: white;
    padding: 10px 18px; border-radius: 8px; font-size: 13px;
    opacity: 0; transition: opacity .3s; z-index: 200; pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* ── LEGEND ── */
  .legend {
    position: fixed; left: 0; top: var(--header-h); bottom: 0; width: 160px;
    background: white; border-right: 1px solid #e0e0e0;
    overflow-y: auto; padding: 12px 10px;
  }
  .legend h3 { font-size: 11px; text-transform: uppercase; color: #888; margin-bottom: 8px; letter-spacing: .5px; }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; padding: 3px 0; cursor: pointer;
  }
  .legend-item.hidden-type { opacity: .35; text-decoration: line-through; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

  /* ── MAIN AREA ── */
  .main {
    margin-top: var(--header-h);
    margin-left: 160px;
    overflow-x: auto;
    padding-bottom: 40px;
  }

  /* ── GRID ── */
  .grid-wrapper {
    display: flex;
    min-width: calc(var(--axis-w) + var(--col-w) * 4);
    position: relative;
  }

  /* ── TIME AXIS ── */
  .time-axis {
    width: var(--axis-w);
    flex-shrink: 0;
    position: relative;
    margin-top: 42px;
  }
  .hour-label {
    position: absolute; right: 8px;
    font-size: 11px; color: #888; line-height: 1;
    transform: translateY(-50%);
  }

  /* ── DAY COLUMNS ── */
  .days-row {
    display: flex;
    flex: 1;
  }
  .day-col {
    width: var(--col-w);
    flex-shrink: 0;
    border-left: 1px solid #d0d0d0;
    position: relative;
  }
  .day-header {
    height: 42px;
    background: var(--green);
    color: white;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 8px;
    font-size: 12px; font-weight: 700;
    position: sticky; top: var(--header-h); z-index: 10;
  }
  .day-header .add-btn {
    background: rgba(255,255,255,.2); border: none; color: white;
    width: 22px; height: 22px; border-radius: 50%;
    cursor: pointer; font-size: 16px; line-height: 20px; text-align: center;
    flex-shrink: 0;
  }
  .day-header .add-btn:hover { background: rgba(255,255,255,.35); }

  .events-area {
    position: relative;
    background: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent calc(var(--px-per-min) * 60px - 1px),
      #e8e8e8 calc(var(--px-per-min) * 60px - 1px),
      #e8e8e8 calc(var(--px-per-min) * 60px)
    );
  }
  .half-line {
    position: absolute; left: 0; right: 0; height: 1px;
    background: #f0f0f0; pointer-events: none;
  }

  /* ── SESSION SEPARATOR ── */
  .session-sep {
    position: absolute; left: 0; right: 0;
    display: flex; align-items: center; gap: 4px;
    pointer-events: none; z-index: 2;
  }
  .session-sep-line { flex: 1; height: 1px; background: var(--pink); opacity: .4; }
  .session-sep-label {
    font-size: 9px; font-weight: 700; color: var(--pink);
    white-space: nowrap; padding: 0 4px; opacity: .8;
  }

  /* ── EVENT BLOCKS ── */
  .event-block {
    position: absolute;
    left: 4px; right: 4px;
    border-radius: 6px;
    padding: 3px 6px 8px 6px;
    cursor: pointer;
    overflow: hidden;
    border-left: 4px solid rgba(0,0,0,.15);
    transition: box-shadow .15s, transform .1s;
    z-index: 3;
  }
  .event-block:hover {
    box-shadow: 0 2px 12px rgba(0,0,0,.2);
    transform: scaleX(1.01);
    z-index: 5;
  }
  .event-block.hidden-type { display: none; }
  .ev-time { font-size: 10px; opacity: .7; font-weight: 600; line-height: 1.2; }
  .ev-title { font-size: 11px; font-weight: 700; line-height: 1.3; margin-top: 1px; }
  .ev-teams { font-size: 9px; color: var(--pink); margin-top: 2px; line-height: 1.3; }
  .resize-handle {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 6px; cursor: ns-resize;
    background: rgba(0,0,0,.08);
    border-radius: 0 0 4px 4px;
  }
  .resize-handle:hover { background: rgba(0,0,0,.2); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.4);
    display: flex; align-items: center; justify-content: center;
    z-index: 150; padding: 20px;
  }
  .modal-overlay.hidden { display: none; }
  .modal-card {
    background: white; border-radius: 12px;
    width: 520px; max-width: 100%; max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 8px 40px rgba(0,0,0,.2);
    padding: 24px;
  }
  .modal-card h2 { font-size: 17px; color: var(--green); margin-bottom: 18px; }
  .form-row { margin-bottom: 14px; }
  .form-row label {
    display: block; font-size: 11px; font-weight: 600;
    color: #555; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .5px;
  }
  .form-row input, .form-row select, .form-row textarea {
    width: 100%; padding: 8px 10px; border: 1.5px solid #d0d0d0;
    border-radius: 7px; font-size: 13px; font-family: var(--font);
    outline: none; transition: border-color .2s;
  }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus {
    border-color: var(--green);
  }
  .form-row textarea { min-height: 70px; resize: vertical; }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .color-row { display: flex; align-items: center; gap: 8px; }
  .color-row input[type=color] {
    width: 40px; height: 36px; padding: 2px; border-radius: 6px; cursor: pointer;
  }
  .type-color-presets { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .color-preset {
    width: 22px; height: 22px; border-radius: 4px;
    cursor: pointer; border: 2px solid transparent;
    transition: border-color .15s;
  }
  .color-preset:hover, .color-preset.active { border-color: #333; }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
  .btn-modal { padding: 8px 16px; border: none; border-radius: 7px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .btn-primary { background: var(--green); color: white; }
  .btn-danger  { background: #e53935; color: white; }
  .btn-cancel  { background: #f5f5f5; color: #333; }
  .btn-modal:hover { opacity: .88; }
  .dur-row { display: flex; align-items: center; gap: 6px; }
  .dur-row input { text-align: center; }
  .dur-btn { padding: 6px 10px; border: 1.5px solid #d0d0d0; border-radius: 6px; background: #f5f5f5; cursor: pointer; font-size: 12px; }
  .dur-btn:hover { background: #e0e0e0; }
  .session-mgr { margin-top: 6px; }
  .session-tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; border-radius: 20px; font-size: 11px;
    background: #f0f0f0; margin: 2px; cursor: default;
  }
  .session-tag .del-tag { cursor: pointer; color: #999; font-size: 13px; }
  .session-tag .del-tag:hover { color: #e53935; }
  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .helper-text { font-size: 11px; color: #777; margin-top: 4px; line-height: 1.4; }
</style>
</head>
<body>

<!-- TOOLBAR -->
<header class="toolbar">
  <span class="logo">&#128197;</span>
  <h1>ACT Conference 2026 &mdash; Planning Interactif</h1>
  <button class="btn btn-add" onclick="openMetaModal()">Infos</button>
  <button class="btn btn-add" onclick="openAddSessionModal()">+ Session</button>
  <button class="btn btn-save" onclick="saveSchedule()">&#128190; Sauvegarder</button>
  <button class="btn btn-docx" onclick="generateDocx()">&#128196; Running Sheet</button>
</header>

<!-- LEGEND -->
<aside class="legend" id="legend"></aside>

<!-- MAIN -->
<main class="main">
  <div class="grid-wrapper">
    <div class="time-axis" id="time-axis"></div>
    <div class="days-row" id="days-row"></div>
  </div>
</main>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- EDIT MODAL -->
<div class="modal-overlay hidden" id="modal">
  <div class="modal-card">
    <h2 id="modal-h2">Événement</h2>
    <input type="hidden" id="f-id">
    <input type="hidden" id="f-day">
    <input type="hidden" id="f-session">

    <div class="form-row">
      <label>Titre</label>
      <input type="text" id="f-title" placeholder="Titre de l'événement">
    </div>
    <div class="form-row-2">
      <div class="form-row" style="margin:0">
        <label>Heure</label>
        <input type="time" id="f-time" step="300">
      </div>
      <div class="form-row" style="margin:0">
        <label>Durée (min)</label>
        <div class="dur-row">
          <button class="dur-btn" onclick="adjustDur(-15)">-15</button>
          <input type="number" id="f-duration" min="5" step="5" style="width:70px">
          <button class="dur-btn" onclick="adjustDur(15)">+15</button>
        </div>
      </div>
    </div>

    <div class="form-row-2">
      <div class="form-row" style="margin:0">
        <label>Type</label>
        <select id="f-type" onchange="onTypeChange()">
          <option value="LOUANGE">Louange</option>
          <option value="PREDICATION">Prédication</option>
          <option value="REPAS">Repas</option>
          <option value="LOGISTIQUE">Logistique</option>
          <option value="REPETITION">Répétition</option>
          <option value="REUNION">Réunion / Brief</option>
          <option value="BOOST">Boost</option>
          <option value="STE_CENE">Ste Cène</option>
          <option value="PRIERE">Prière</option>
          <option value="INTERCESSION">Intercession</option>
          <option value="FUNDRAISING">Levée de fonds</option>
          <option value="TED_PITCH">Pitch / TED</option>
          <option value="ANNONCES">Annonces</option>
          <option value="TECHNIQUE">Technique</option>
        </select>
      </div>
      <div class="form-row" style="margin:0">
        <label>Session</label>
        <select id="f-session-sel"></select>
      </div>
    </div>

    <div class="form-row">
      <label>Couleur</label>
      <div class="color-row">
        <input type="color" id="f-color">
        <div class="type-color-presets" id="color-presets"></div>
      </div>
    </div>

    <div class="form-row">
      <label>Équipes responsables <span style="color:#aaa;font-weight:400">(séparées par des virgules)</span></label>
      <input type="text" id="f-teams" placeholder="Team Louange, Team Son, …">
    </div>

    <div class="form-row">
      <label>Détails / Notes Running Sheet</label>
      <textarea id="f-details" placeholder="Détails, instructions, notes pour la Running Sheet…"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-modal btn-danger" id="btn-delete" onclick="deleteEvent()" style="display:none;margin-right:auto">
        &#128465; Supprimer
      </button>
      <button class="btn-modal btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-modal btn-primary" onclick="saveEvent()">&#10003; Enregistrer</button>
    </div>
  </div>
</div>

<!-- ADD SESSION MODAL -->
<div class="modal-overlay hidden" id="modal-session">
  <div class="modal-card">
    <h2>Ajouter / Gérer les sessions</h2>
    <div class="form-row">
      <label>Jour</label>
      <select id="fs-day"></select>
    </div>
    <div class="form-row">
      <label>Sessions existantes</label>
      <div class="session-mgr" id="fs-existing"></div>
    </div>
    <div class="form-row">
      <label>Nouveau nom de session</label>
      <input type="text" id="fs-name" placeholder="Ex: Soirée, Matinée, Après-midi…">
    </div>
    <div class="modal-actions">
      <button class="btn-modal btn-cancel" onclick="closeSessionModal()">Fermer</button>
      <button class="btn-modal btn-primary" onclick="addSession()">+ Ajouter</button>
    </div>
  </div>
</div>

<!-- META MODAL -->
<div class="modal-overlay hidden" id="modal-meta">
  <div class="modal-card">
    <h2>Informations générales de la Running Sheet</h2>
    <div class="meta-grid">
      <div class="form-row" style="margin:0">
        <label>Nom de l'événement</label>
        <input type="text" id="m-event" placeholder="ACT Conference 2026">
      </div>
      <div class="form-row" style="margin:0">
        <label>Lieu</label>
        <input type="text" id="m-lieu" placeholder="Espace 140, Rillieux la Pape">
      </div>
    </div>
    <div class="meta-grid">
      <div class="form-row" style="margin:0">
        <label>Dates installation</label>
        <input type="text" id="m-installation" placeholder="Jeudi 14 mai 2026">
      </div>
      <div class="form-row" style="margin:0">
        <label>Dates conférence</label>
        <input type="text" id="m-conference" placeholder="Vendredi 15 – Dimanche 17 mai 2026">
      </div>
    </div>
    <div class="form-row">
      <label>Dress code</label>
      <input type="text" id="m-dresscode" placeholder="Bracelet bleu pour la Dream Team">
    </div>
    <div class="form-row">
      <label>Nombre de personnes attendues</label>
      <div class="meta-grid">
        <div class="form-row" style="margin:0">
          <label>Vendredi</label>
          <input type="text" id="m-att-vendredi" placeholder="Ex: 400">
        </div>
        <div class="form-row" style="margin:0">
          <label>Samedi</label>
          <input type="text" id="m-att-samedi" placeholder="Ex: 550">
        </div>
      </div>
      <div class="form-row" style="margin-top:12px">
        <label>Dimanche</label>
        <input type="text" id="m-att-dimanche" placeholder="Ex: 450">
      </div>
      <div class="helper-text">Ces informations sont reprises en tête de la Running Sheet exportée.</div>
    </div>
    <div class="modal-actions">
      <button class="btn-modal btn-cancel" onclick="closeMetaModal()">Annuler</button>
      <button class="btn-modal btn-primary" onclick="saveMeta()">&#10003; Enregistrer</button>
    </div>
  </div>
</div>

<script>
// ── CONSTANTS ──
const PX_PER_MIN = 1.6;
const START_H = 7;
const END_H = 23;
const TOTAL_MINS = (END_H - START_H) * 60;

const TYPE_COLORS = {
  LOUANGE:      '#C39BD3',
  PREDICATION:  '#82E0AA',
  REPAS:        '#FAD7A0',
  LOGISTIQUE:   '#AED6F1',
  REPETITION:   '#D7BDE2',
  REUNION:      '#D5F5E3',
  BOOST:        '#F1948A',
  STE_CENE:     '#BB8FCE',
  PRIERE:       '#7FB3D3',
  INTERCESSION: '#D6EAF8',
  FUNDRAISING:  '#F9E79F',
  TED_PITCH:    '#A9DFBF',
  ANNONCES:     '#A9DFBF',
  TECHNIQUE:    '#D5D8DC'
};

const TYPE_LABELS = {
  LOUANGE: 'Louange', PREDICATION: 'Prédication', REPAS: 'Repas',
  LOGISTIQUE: 'Logistique', REPETITION: 'Répétition', REUNION: 'Réunion / Brief',
  BOOST: 'Boost', STE_CENE: 'Ste Cène', PRIERE: 'Prière',
  INTERCESSION: 'Intercession', FUNDRAISING: 'Levée de fonds',
  TED_PITCH: 'Pitch / TED', ANNONCES: 'Annonces', TECHNIQUE: 'Technique'
};

let schedule = null;
let hiddenTypes = new Set();

// ── TIME UTILITIES ──
function timeToY(t) {
  const [h, m] = t.split(':').map(Number);
  return ((h - START_H) * 60 + m) * PX_PER_MIN;
}
function yToTime(y) {
  const totalMin = Math.round(y / PX_PER_MIN / 5) * 5;
  const clamped = Math.max(0, Math.min(totalMin, TOTAL_MINS - 15));
  const h = START_H + Math.floor(clamped / 60);
  const m = clamped % 60;
  return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
}
function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function genId() { return 'e_' + Math.random().toString(36).slice(2,9); }

function ensureScheduleShape() {
  schedule.attendance = schedule.attendance || {};
  ['vendredi', 'samedi', 'dimanche'].forEach(key => {
    if (schedule.attendance[key] === undefined) schedule.attendance[key] = '';
  });
}

// ── LOAD + RENDER ──
async function loadSchedule() {
  try {
    const r = await fetch('/api/schedule');
    schedule = await r.json();
    ensureScheduleShape();
    renderAll();
  } catch (err) {
    document.getElementById('days-row').innerHTML = '<div style="padding:24px;color:#b00020;font-weight:600">Erreur de chargement du planning. Rechargez la page ou relancez l'outil.</div>';
    console.error(err);
  }
}

function renderAll() {
  renderTimeAxis();
  renderLegend();
  renderDays();
}

function renderTimeAxis() {
  const ax = document.getElementById('time-axis');
  ax.style.height = TOTAL_MINS * PX_PER_MIN + 'px';
  ax.innerHTML = '';
  for (let h = START_H; h <= END_H; h++) {
    const y = (h - START_H) * 60 * PX_PER_MIN;
    const lbl = document.createElement('div');
    lbl.className = 'hour-label';
    lbl.style.top = y + 'px';
    lbl.textContent = String(h).padStart(2,'0') + ':00';
    ax.appendChild(lbl);
  }
}

function renderLegend() {
  const leg = document.getElementById('legend');
  leg.innerHTML = '<h3>Types d'événements</h3>';
  Object.entries(TYPE_LABELS).forEach(([k, label]) => {
    const item = document.createElement('div');
    item.className = 'legend-item' + (hiddenTypes.has(k) ? ' hidden-type' : '');
    item.dataset.type = k;
    item.innerHTML = `<div class="legend-dot" style="background:${TYPE_COLORS[k]}"></div>${label}`;
    item.addEventListener('click', () => {
      if (hiddenTypes.has(k)) hiddenTypes.delete(k);
      else hiddenTypes.add(k);
      renderAll();
    });
    leg.appendChild(item);
  });
}

function renderDays() {
  const row = document.getElementById('days-row');
  row.innerHTML = '';
  const timelineH = TOTAL_MINS * PX_PER_MIN;

  for (const day of schedule.days) {
    const col = document.createElement('div');
    col.className = 'day-col';
    col.dataset.dayId = day.id;

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'day-header';
    hdr.innerHTML = `<span>${day.name}</span><button class="add-btn" title="Ajouter un événement" onclick="openAddModal('${day.id}')">+</button>`;
    col.appendChild(hdr);

    // Events area
    const area = document.createElement('div');
    area.className = 'events-area';
    area.style.height = timelineH + 'px';
    area.dataset.dayId = day.id;

    // Half-hour lines
    for (let m = 30; m < TOTAL_MINS; m += 60) {
      const line = document.createElement('div');
      line.className = 'half-line';
      line.style.top = m * PX_PER_MIN + 'px';
      area.appendChild(line);
    }

    // Click on empty area → add event
    area.addEventListener('click', function(e) {
      if (e.target === area) {
        const rect = area.getBoundingClientRect();
        const y = e.clientY - rect.top + area.parentElement.parentElement.scrollTop;
        openAddModal(day.id, null, yToTime(y));
      }
    });

    // Sessions + events
    let prevSessionStart = -1;
    for (const session of day.sessions) {
      if (session.events.length === 0) continue;
      const firstTime = session.events[0].time;
      const sepY = timeToY(firstTime) - 18;
      if (sepY > prevSessionStart) {
        const sep = document.createElement('div');
        sep.className = 'session-sep';
        sep.style.top = Math.max(0, sepY) + 'px';
        sep.innerHTML = `<div class="session-sep-line"></div><div class="session-sep-label">${esc(session.name)}</div><div class="session-sep-line"></div>`;
        area.appendChild(sep);
        prevSessionStart = sepY;
      }

      for (const ev of session.events) {
        if (!ev.time) continue;
        const block = createEventBlock(ev, day.id, session.id);
        area.appendChild(block);
      }
    }

    col.appendChild(area);
    row.appendChild(col);
  }

  // Update grid wrapper height
  document.querySelector('.time-axis').style.height = timelineH + 'px';
}

function createEventBlock(ev, dayId, sessionId) {
  const top = timeToY(ev.time);
  const h = Math.max(ev.duration * PX_PER_MIN, 22);
  const div = document.createElement('div');
  div.className = 'event-block' + (hiddenTypes.has(ev.type) ? ' hidden-type' : '');
  div.dataset.evId = ev.id;
  div.dataset.type = ev.type;
  div.style.cssText = `top:${top}px;height:${h}px;background:${ev.color||'#AED6F1'}`;
  div.style.borderLeftColor = darken(ev.color||'#AED6F1', 40);

  const teamsHtml = (ev.teams||[]).length
    ? `<div class="ev-teams">${esc((ev.teams||[]).join(', '))}</div>` : '';
  div.innerHTML = `
    <div class="ev-time">${esc(ev.time)}${ev.duration >= 15 ? ' <span style="opacity:.55">(${ev.duration}min)</span>' : ''}</div>
    <div class="ev-title">${esc(ev.title)}</div>
    ${teamsHtml}
    <div class="resize-handle"></div>
  `;

  div.addEventListener('click', e => { if (!e._resized) openEditModal(ev, dayId, sessionId); });

  div.addEventListener('mousedown', e => {
    if (e.target.classList.contains('resize-handle') || e.button !== 0) return;
    const startY = e.clientY;
    const startTime = ev.time;
    let moved = false;
    const onMove = me => {
      const delta = me.clientY - startY;
      if (Math.abs(delta) < 4) return;
      moved = true;
      me.preventDefault();
      ev.time = yToTime(timeToY(startTime) + delta);
      div.style.top = timeToY(ev.time) + 'px';
      const timeEl = div.querySelector('.ev-time');
      if (timeEl) {
        timeEl.innerHTML = `${esc(ev.time)}${ev.duration >= 15 ? ' <span style="opacity:.55">(' + ev.duration + 'min)</span>' : ''}`;
      }
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      if (moved) {
        const day = schedule.days.find(d => d.id === dayId);
        const session = day ? day.sessions.find(s => s.id === sessionId) : null;
        if (session) session.events.sort((a, b) => a.time.localeCompare(b.time));
        div._resized = true;
        setTimeout(() => { if (div) delete div._resized; }, 200);
        renderDays();
      }
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  // Resize
  div.querySelector('.resize-handle').addEventListener('mousedown', e => {
    e.stopPropagation(); e.preventDefault();
    const startY = e.clientY;
    const startDur = ev.duration;
    const onMove = me => {
      const delta = me.clientY - startY;
      ev.duration = Math.max(5, Math.round((startDur + delta / PX_PER_MIN) / 5) * 5);
      div.style.height = Math.max(ev.duration * PX_PER_MIN, 22) + 'px';
      const durEl = div.querySelector('.ev-time');
      if (durEl) durEl.innerHTML = `${esc(ev.time)} <span style="opacity:.55">(${ev.duration}min)</span>`;
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      e.target.parentElement._resized = true;
      setTimeout(() => { if(e.target.parentElement) delete e.target.parentElement._resized; }, 200);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  return div;
}

function darken(hex, amt) {
  let r = parseInt(hex.slice(1,3),16) - amt;
  let g = parseInt(hex.slice(3,5),16) - amt;
  let b = parseInt(hex.slice(5,7),16) - amt;
  r = Math.max(0,r); g = Math.max(0,g); b = Math.max(0,b);
  return '#' + [r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}

// ── MODAL ──
let _editEv = null, _editDay = null, _editSession = null;

function buildSessionSelect(dayId, currentSession) {
  const sel = document.getElementById('f-session-sel');
  sel.innerHTML = '';
  const day = schedule.days.find(d => d.id === dayId);
  if (!day) return;
  day.sessions.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id; opt.textContent = s.name;
    if (s.id === currentSession) opt.selected = true;
    sel.appendChild(opt);
  });
}

function buildColorPresets() {
  const container = document.getElementById('color-presets');
  container.innerHTML = '';
  Object.entries(TYPE_COLORS).forEach(([type, color]) => {
    const dot = document.createElement('div');
    dot.className = 'color-preset';
    dot.style.background = color;
    dot.title = TYPE_LABELS[type] || type;
    dot.dataset.color = color;
    dot.addEventListener('click', () => {
      document.getElementById('f-color').value = color;
      document.querySelectorAll('.color-preset').forEach(d => d.classList.remove('active'));
      dot.classList.add('active');
    });
    container.appendChild(dot);
  });
}

function openEditModal(ev, dayId, sessionId) {
  _editEv = ev; _editDay = dayId; _editSession = sessionId;
  document.getElementById('modal-h2').textContent = 'Modifier l'événement';
  document.getElementById('f-id').value = ev.id;
  document.getElementById('f-day').value = dayId;
  document.getElementById('f-time').value = ev.time;
  document.getElementById('f-duration').value = ev.duration;
  document.getElementById('f-title').value = ev.title;
  document.getElementById('f-type').value = ev.type || 'ANNONCES';
  document.getElementById('f-color').value = ev.color || '#AED6F1';
  document.getElementById('f-teams').value = (ev.teams||[]).join(', ');
  document.getElementById('f-details').value = ev.details || '';
  buildSessionSelect(dayId, sessionId);
  buildColorPresets();
  document.getElementById('btn-delete').style.display = 'inline-flex';
  document.getElementById('modal').classList.remove('hidden');
}

function openAddModal(dayId, sessionId, time) {
  _editEv = null; _editDay = dayId; _editSession = sessionId;
  document.getElementById('modal-h2').textContent = 'Ajouter un événement';
  document.getElementById('f-id').value = '';
  document.getElementById('f-day').value = dayId;
  document.getElementById('f-time').value = time || '09:00';
  document.getElementById('f-duration').value = 30;
  document.getElementById('f-title').value = '';
  document.getElementById('f-type').value = 'ANNONCES';
  document.getElementById('f-color').value = '#A9DFBF';
  document.getElementById('f-teams').value = '';
  document.getElementById('f-details').value = '';
  // default to first session if none given
  const day = schedule.days.find(d => d.id === dayId);
  buildSessionSelect(dayId, sessionId || (day && day.sessions[0] && day.sessions[0].id));
  buildColorPresets();
  document.getElementById('btn-delete').style.display = 'none';
  document.getElementById('modal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
  _editEv = null;
}

function onTypeChange() {
  const type = document.getElementById('f-type').value;
  const color = TYPE_COLORS[type];
  if (color) {
    document.getElementById('f-color').value = color;
    document.querySelectorAll('.color-preset').forEach(d => {
      d.classList.toggle('active', d.dataset.color === color);
    });
  }
}

function adjustDur(delta) {
  const inp = document.getElementById('f-duration');
  inp.value = Math.max(5, (parseInt(inp.value)||30) + delta);
}

function saveEvent() {
  const id = document.getElementById('f-id').value || genId();
  const dayId = document.getElementById('f-day').value;
  const sessionId = document.getElementById('f-session-sel').value;
  const teams = document.getElementById('f-teams').value
    .split(',').map(t => t.trim()).filter(t => t);

  const ev = {
    id,
    time: document.getElementById('f-time').value,
    duration: parseInt(document.getElementById('f-duration').value) || 30,
    title: document.getElementById('f-title').value,
    type: document.getElementById('f-type').value,
    color: document.getElementById('f-color').value,
    teams,
    details: document.getElementById('f-details').value
  };

  const day = schedule.days.find(d => d.id === dayId);
  if (!day) return;

  // Remove from old session if session changed
  if (_editEv && _editSession && _editSession !== sessionId) {
    const oldSession = day.sessions.find(s => s.id === _editSession);
    if (oldSession) oldSession.events = oldSession.events.filter(e => e.id !== id);
  }

  const session = day.sessions.find(s => s.id === sessionId);
  if (!session) return;

  const idx = session.events.findIndex(e => e.id === id);
  if (idx >= 0) session.events[idx] = ev;
  else session.events.push(ev);

  // Sort by time
  session.events.sort((a, b) => a.time.localeCompare(b.time));

  closeModal();
  renderDays();
  showToast('Événement enregistré');
}

function deleteEvent() {
  if (!_editEv) return;
  if (!confirm('Supprimer cet événement ?')) return;
  const day = schedule.days.find(d => d.id === _editDay);
  if (day) {
    day.sessions.forEach(s => {
      s.events = s.events.filter(e => e.id !== _editEv.id);
    });
  }
  closeModal();
  renderDays();
  showToast('Événement supprimé');
}

// ── SESSION MODAL ──
function openAddSessionModal() {
  const sel = document.getElementById('fs-day');
  sel.innerHTML = '';
  schedule.days.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.id; opt.textContent = d.name;
    sel.appendChild(opt);
  });
  renderExistingSessions(sel.value);
  sel.onchange = () => renderExistingSessions(sel.value);
  document.getElementById('fs-name').value = '';
  document.getElementById('modal-session').classList.remove('hidden');
}

function renderExistingSessions(dayId) {
  const day = schedule.days.find(d => d.id === dayId);
  const container = document.getElementById('fs-existing');
  container.innerHTML = '';
  if (!day) return;
  day.sessions.forEach(s => {
    const tag = document.createElement('span');
    tag.className = 'session-tag';
    tag.innerHTML = `${esc(s.name)} <span class="del-tag" title="Supprimer" onclick="deleteSession('${dayId}','${s.id}')">&#10005;</span>`;
    container.appendChild(tag);
  });
}

function addSession() {
  const dayId = document.getElementById('fs-day').value;
  const name = document.getElementById('fs-name').value.trim();
  if (!name) return;
  const day = schedule.days.find(d => d.id === dayId);
  if (!day) return;
  day.sessions.push({ id: 'sess_' + genId(), name, events: [] });
  document.getElementById('fs-name').value = '';
  renderExistingSessions(dayId);
  showToast('Session ajoutée');
}

function deleteSession(dayId, sessionId) {
  const day = schedule.days.find(d => d.id === dayId);
  if (!day) return;
  const sess = day.sessions.find(s => s.id === sessionId);
  if (sess && sess.events.length > 0) {
    if (!confirm(`Supprimer la session "${sess.name}" et ses ${sess.events.length} événement(s) ?`)) return;
  }
  day.sessions = day.sessions.filter(s => s.id !== sessionId);
  renderExistingSessions(dayId);
  renderDays();
}

function closeSessionModal() {
  document.getElementById('modal-session').classList.add('hidden');
  renderDays();
}

function openMetaModal() {
  ensureScheduleShape();
  document.getElementById('m-event').value = schedule.event || '';
  document.getElementById('m-lieu').value = schedule.lieu || '';
  document.getElementById('m-installation').value = schedule.installation_dates || '';
  document.getElementById('m-conference').value = schedule.conference_dates || '';
  document.getElementById('m-dresscode').value = schedule.dresscode || '';
  document.getElementById('m-att-vendredi').value = schedule.attendance.vendredi || '';
  document.getElementById('m-att-samedi').value = schedule.attendance.samedi || '';
  document.getElementById('m-att-dimanche').value = schedule.attendance.dimanche || '';
  document.getElementById('modal-meta').classList.remove('hidden');
}

function closeMetaModal() {
  document.getElementById('modal-meta').classList.add('hidden');
}

function saveMeta() {
  ensureScheduleShape();
  schedule.event = document.getElementById('m-event').value.trim();
  schedule.lieu = document.getElementById('m-lieu').value.trim();
  schedule.installation_dates = document.getElementById('m-installation').value.trim();
  schedule.conference_dates = document.getElementById('m-conference').value.trim();
  schedule.dresscode = document.getElementById('m-dresscode').value.trim();
  schedule.attendance.vendredi = document.getElementById('m-att-vendredi').value.trim();
  schedule.attendance.samedi = document.getElementById('m-att-samedi').value.trim();
  schedule.attendance.dimanche = document.getElementById('m-att-dimanche').value.trim();
  closeMetaModal();
  showToast('Infos générales enregistrées');
}

// ── SAVE / GENERATE ──
async function saveSchedule() {
  const r = await fetch('/api/schedule', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(schedule)
  });
  if (r.ok) showToast('&#128190; Planning sauvegardé !');
}

async function generateDocx() {
  showToast('&#9201; Génération du Running Sheet...');
  const r = await fetch('/api/generate-docx', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(schedule)
  });
  if (r.ok) {
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'Running_Sheet_ACT_2026.docx';
    document.body.appendChild(a); a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
    showToast('&#128196; Running Sheet téléchargé !');
  } else {
    showToast('Erreur lors de la génération');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerHTML = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});
document.getElementById('modal-session').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-session')) closeSessionModal();
});
document.getElementById('modal-meta').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-meta')) closeMetaModal();
});

// Start
loadSchedule();
</script>
